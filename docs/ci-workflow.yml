# GitHub Actions CI — add this to .github/workflows/ci.yml after enabling workflow scope on your token
# See: https://github.com/settings/tokens

name: OmniPost CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd backend && npm install
      - run: cd frontend && npm install
      - run: cd frontend && npm run build
